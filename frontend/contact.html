<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Raahi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--color-surface-soft);">

    <nav class="navbar" style="background: var(--color-canvas);">
        <div class="container">
            <a href="index.html" class="brand-logo">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                Raahi
            </a>
            <div class="nav-links">
                <a href="about.html" class="nav-link">Our Story</a>
                <a href="dashboard.html" class="nav-link">How it works</a>
                <a href="contact.html" class="nav-link" style="color: var(--color-primary);">Contact</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="nav-link">Log in</a>
                <a href="register.html" class="btn btn-primary btn-pill">Sign up</a>
            </div>
        </div>
    </nav>

    <main class="container section">
        <div class="card" style="max-width: 600px; margin: 0 auto; padding: var(--space-xl);">
            <h1 class="text-display-lg mb-md text-center">Get in touch</h1>
            <p class="text-body-md text-center mb-xl">Have a question about Raahi? Our support team is available 24/7.</p>
            
            <form>
                <div class="input-group">
                    <label class="input-label">Full Name</label>
                    <input type="text" class="input-field" placeholder="Jane Doe">
                </div>
                <div class="input-group">
                    <label class="input-label">Email address</label>
                    <input type="email" class="input-field" placeholder="jane@example.com">
                </div>
                <div class="input-group">
                    <label class="input-label">Message</label>
                    <textarea class="input-field" rows="5" placeholder="How can we help?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-full" style="height: 56px;">Send Message</button>
            </form>
        </div>
    </main>

</body>
</html>
