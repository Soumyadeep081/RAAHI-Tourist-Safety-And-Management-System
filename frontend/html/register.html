<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up â€“ Raahi</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
    <nav class="navbar" style="background: var(--color-canvas);"><div class="container"><a href="../index.html" class="brand-logo"><div class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>Raahi</a></div></nav>
    <main class="container section flex-center" style="min-height: calc(100vh - 80px);">
        <div class="card" style="width: 100%; max-width: 480px; padding: var(--space-xl);">
            <h1 class="text-display-md mb-lg">Create an account</h1>
            <form id="register-form">
                <div class="input-group">
                    <label class="input-label" for="reg-name">Full name</label>
                    <input type="text" id="reg-name" class="input-field" placeholder="Jane Doe" required>
                </div>
                <div class="input-group">
                    <label class="input-label" for="reg-email">Email</label>
                    <input type="email" id="reg-email" class="input-field" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label class="input-label" for="reg-phone">Phone number</label>
                    <input type="tel" id="reg-phone" class="input-field" placeholder="+1 234 567 8900" required>
                </div>
                <div class="input-group mb-lg">
                    <label class="input-label" for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="input-field" placeholder="Create a password" required minlength="8">
                    <p class="text-body-sm mt-xs" style="color: var(--color-muted); font-size: 11px;">Minimum 8 characters required.</p>
                </div>
                <button type="submit" id="register-btn" class="btn btn-primary w-full" style="height: 56px;">Sign up</button>
            </form>
            <div class="text-center mt-md text-body-sm">
                Already have an account? <a href="login.html" style="color: var(--color-primary); font-weight: 500;">Log in</a>
            </div>
        </div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
